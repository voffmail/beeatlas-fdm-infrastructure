services:
  vscode:
    build:
      context: .
      args:
        USER_UID: 1000
        USER_GID: 1000
    container_name: vscode
    ports:
      - "8088:8080"
    environment:
      - PASSWORD=my_secure_password
      - WORKSPACE=workspace
    volumes:
      # Монтируем папку с проектами
      - ./workspace:/home/vscode/workspace
      # Том для расширений (сохраняются между перезапусками)
      - ./vscode-extensions:/home/vscode/.local/share/code-server/extensions
      # Монтируем локальную папку с сертификатами (если есть)
      - ./certs:/certs:ro
    networks:
      - fdm-network
    restart: unless-stopped

