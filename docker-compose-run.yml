
include:
  - ./infrastructure/n8n/compose.n8n.yml
  - ./infrastructure/vscode/docker-compose.yml

services:
  postgres:
    image: postgres:15-alpine
    command: postgres -c 'max_connections=200'
    container_name: fdm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fdm_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    ports:
      - "5433:5432"
    networks:
      - fdm-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fdm-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - fdm-network

    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: [ "redis-server", "--save", "", "--appendonly", "no", "--requirepass", "redis-password" ]
    networks:
      - fdm-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "redis-password", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-postgres:
    image: postgres:15-alpine
    container_name: authentik-postgres
    networks:
      - fdm-network
    ports:
      - "5434:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik
      POSTGRES_DB: authentik_db
    volumes:
      - authentik-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U authentik -d authentik_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2025.10.2
    container_name: authentik-server
    command: server
    restart: unless-stopped
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__PORT: 5432
      AUTHENTIK_POSTGRESQL__NAME: authentik_db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD: redis-password
      AUTHENTIK_SECRET_KEY: my-strong-secret-key
    ports:
      - "5000:9000"
      - "5443:9443"
    volumes:
      - ./authentik-blueprints:/blueprints/custom:ro
      - authentik-media:/media
      - authentik-templates:/templates
    depends_on:
      authentik-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fdm-network

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.10.2
    container_name: authentik-worker
    command: worker
    restart: unless-stopped
    user: root
    environment:
      AUTHENTIK_BOOTSTRAP_PASSWORD: "password"
      AUTHENTIK_BOOTSTRAP_EMAIL: "admin@test.ru"
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__PORT: 5432
      AUTHENTIK_POSTGRESQL__NAME: authentik_db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD: redis-password
      AUTHENTIK_SECRET_KEY: my-strong-secret-key
      FDM_FRONTEND_URL: ${FDM_FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./authentik-blueprints:/blueprints/custom:ro
      - authentik-media:/media
      - authentik-templates:/templates
      - authentik-certs:/certs
    depends_on:
      authentik-server:
        condition: service_healthy
      authentik-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fdm-network

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    ports:
      - "7474:7474"  # HTTP - Neo4j Browser
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - fdm-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  document-service-minio:
    image: minio/minio:latest
    container_name: document-service-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${DOCUMENT_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${DOCUMENT_MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${DOCUMENT_MINIO_API_PORT:-9000}:9000"
      - "${DOCUMENT_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - document-service-minio:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fdm-network

  document-service-minio-init:
    image: minio/mc:latest
    container_name: document-service-minio-init
    depends_on:
      document-service-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://document-service-minio:9000 ${DOCUMENT_MINIO_ROOT_USER:-minioadmin} ${DOCUMENT_MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${DOCUMENT_MINIO_BUCKET_NAME:-document-service-documents}
      "
    restart: "no"
    networks:
      - fdm-network

  # Read more info at https://github.com/AmoyLab/Unla
  mcp-gateway:
    image: ${IMAGE:-ghcr.io/amoylab/unla/allinone:latest}
    container_name: mcp-gateway
    ports:
      - "18080:80"
      - "5234:5234"
      - "5235:5235"
      - "5236:5236"
    environment:
      ENV: production
      TZ: ${TZ:-UTC}
      SUPER_ADMIN_USERNAME: admin
      SUPER_ADMIN_PASSWORD: secure-password
    volumes:
      - ./unla/configs:/app/configs
      - ./unla/data:/app/data
      - ./unla/.env:/app/.env
    restart: unless-stopped
    networks:
      - fdm-network

  mcp-gateway-init:
    image: curlimages/curl:latest
    container_name: mcp-gateway-init
    depends_on:
      mcp-gateway:
        condition: service_started
    volumes:
      - ./unla/configs/mcp:/configs:ro
      - ./unla/scripts/bootstrap-mcp.sh:/bootstrap.sh:ro
    environment:
      UNLA_URL: http://mcp-gateway:5234
      UNLA_USER: admin
      UNLA_PASSWORD: secure-password
      FDM_GATEWAY_URL: ${UNLA_FDM_GATEWAY_URL:-http://gateway:8080}
      CONFIG_FILE: /configs/beeatlas-fdm.yaml
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    restart: "no"
    networks:
      - fdm-network

  gateway:
    image: ghcr.io/tech-beeline/beeatlas-fdm-gateway-service:latest
    container_name: gateway
    restart: unless-stopped
    depends_on:
      fdm-auth-backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8090:8090"
      - "10260:10260"
    env_file:
      - ./common.env
    environment:
      JWKS: "jwks"
      SPRING_PROFILES_ACTIVE: local
      CORS_ENABLED: 'true'
      DEMO_AUTH: 'true'
      AUTHENTIC_AUTH: 'false'
      QUEUE_USER_DROP_CACHE_NAME: user_drop_cache
    networks:
      - fdm-network

  beeatlas-frontend:
    image: ghcr.io/tech-beeline/beeatlas-prospect-frontend:latest
    container_name: beeatlas-frontend
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started
      authentik-server:
        condition: service_started
    ports:
      - "3000:8080"
    environment:
      FLAG_IS_PROD: "false"
      FLAG_IS_DEMO_STAND: "true"
      FLAG_API_URL: ""
      FLAG_AUTHENTIK_URL: http://localhost:5000
      FLAG_AUTHENTIK_CLIENT_ID: SxbmzvcDJHqs415xgqo8hPQh6CtHvop5jFGF1Wb2
      FLAG_DOC_SERVICE_URL: http://localhost:8097
      FLAG_WEBIDE_URL: http://localhost:8088
      NGINX_LOCATION_API_GATEWAY: http://gateway:8080
      NGINX_LOCATION_API: http://gateway:8080
    networks:
      - fdm-network

  beeatlas-doc:
    image: ghcr.io/tech-beeline/beeatlas-doc:latest
    container_name: beeatlas-doc
    restart: unless-stopped
    ports:
      - "${BEEATLAS_DOC_SERVICE_PORT:-8097}:8080"
    networks:
      - fdm-network

  fdm-auth-backend:
    image: ghcr.io/tech-beeline/beeatlas-fdm-auth-service:latest
    pull_policy: always
    container_name: fdm-auth-backend
    env_file:
      - ./common.env
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: user_auth
      SPRING_FLYWAY_DEFAULT_SCHEMA: user_auth
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
      AUTHBASIC: "Basic xxxxxxxx"
      TECHUSER: "tech-user"
      TECHPASSWORD: "tech-password"
      FDM_AUTH_KAFKA_ENABLED: false
      INTEGRATION_MYPROFILE_SERVER_URL: https://myprofile
      INTEGRATION_MYPROFILE_TOKEN: token
      OTEL_EXPORTER_OTLP_ENDPOINT:  # заменить на URL OTEL
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 5s
      timeout: 3s
      retries: 15
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${FDM_AUTH_SERVICE_PORT:-8081}:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  capability-backend:
    image: ghcr.io/tech-beeline/beeatlas-capability-backend-service:latest
    container_name: capability-backend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./common.env
    environment:
      SPRING_RABBITMQ_TEMPLATE_EXCHANGE: capability.exchange
      SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: capability.routing
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: capability
      SPRING_FLYWAY_DEFAULT_SCHEMA: capability
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    ports:
      - "${CAPABILITY_SERVICE_PORT:-8082}:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  architect-graph-service:
    image: ghcr.io/tech-beeline/beeatlas-architect-graph-service:latest
    container_name: architect-graph-service
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./common.env
    environment:
      JAVA_OPTS: -Xmx512m -Xms256m
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redis-password
      SPRING_RABBITMQ_TEMPLATE_EXCHANGE: ${RABBITMQ_EXCHANGE:-capability.exchange}
      SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: ${RABBITMQ_ROUTING_KEY:-capability.routing}
      INTEGRATION_PRODUCT_SERVER_URL: http://products-service:8080
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    ports:
      - "8083:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  products-service:
    image: ghcr.io/tech-beeline/beeatlas-fdm-products-service:latest
    container_name: products-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./common.env
    environment:
      SPRING_RABBITMQ_TEMPLATE_EXCHANGE: capability.exchange
      SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: capability.routing
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: product
      SPRING_FLYWAY_DEFAULT_SCHEMA: product
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 3s
      retries: 15
      start_period: 180s
    ports:
      - "8084:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  techradar-backend:
    image: ghcr.io/tech-beeline/beeatlas-fdm-techradar-service:latest
    container_name: techradar-backend
    env_file:
      - ./common.env
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: techradar
      SPRING_FLYWAY_DEFAULT_SCHEMA: techradar
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 180s
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  structurizr-backend:
    tty: true
    container_name: structurizr-backend
    environment:
      URL_ONPREMISES_WORKSPACE: http://on-premises:8080/api/workspace
      URL_ONPREMISES_BASE: http://on-premises:8080/api
      ONPREMISES_PASSWORD: password
      URL_VEGA: https://vega.vimpelcom.ru
      URL_DOCUMENTS: http://document-service:8080
      URL_PRODUCTS: http://products-service:8080
      CAPABILITY_API_URL: http://capability-backend:8080
      URL_GRAPH: http://architect-graph-service:8080
      URL_TECHRADAR: http://techradar-backend:8080
    image: ghcr.io/tech-beeline/beeatlas-structurizr-backend:latest
    ports:
      - "8086:8080"
    networks:
      - fdm-network
    depends_on:
      on-premises:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()\" || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  on-premises:
    image: structurizr/onpremises:2025.05.28
    container_name: on-premises
    ports:
      - "8087:8080"
    volumes:
      - /data/on-premises/structurizr:/usr/local/structurizr
    networks:
      - fdm-network
    command: >
      sh -c "
        if [ ! -f /usr/local/structurizr/structurizr.properties ]; then
          echo 'Creating structurizr.properties with API key...'
          echo 'structurizr.apiKey=$$2a$$10$$qlXOc8yhsUvt04Jf0PkctuWVYlLOy6iL8c9W72IXVwoYSASPcGEtq' > /usr/local/structurizr/structurizr.properties
          echo 'Created'
        fi
        echo 'Starting Structurizr...'
        exec catalina.sh run
      "
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 30s
      timeout: 10s
      retries: 5

  cx-service:
    image: ghcr.io/tech-beeline/beeatlas-fdm-cx-service:latest
    container_name: cx-service
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./common.env
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: cx
      SPRING_FLYWAY_DEFAULT_SCHEMA: cx
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    ports:
      - "${CX_SERVICE_PORT:-8098}:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  notifications-service:
    image: ghcr.io/tech-beeline/beeatlas-notifications-management:latest
    container_name: notifications-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./common.env
    environment:
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/}
      SPRING_RABBITMQ_TEMPLATE_EXCHANGE: ${RABBITMQ_EXCHANGE:-capability.exchange}
      SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: ${RABBITMQ_ROUTING_KEY:-capability.routing}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: notification
      SPRING_FLYWAY_DEFAULT_SCHEMA: notification
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    ports:
      - "${NOTIFICATIONS_SERVICE_PORT:-8089}:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  document-service:
    image: ghcr.io/tech-beeline/beeatlas-document-service:latest
    container_name: document-service
    depends_on:
      postgres:
        condition: service_healthy
      document-service-minio:
        condition: service_healthy
      document-service-minio-init:
        condition: service_completed_successfully
    env_file:
      - ./common.env
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: documents
      SPRING_FLYWAY_DEFAULT_SCHEMA: documents
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 5s
      timeout: 3s
      retries: 15
    ports:
      - "${DOCUMENT_SERVICE_PORT:-8091}:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  fdm-pack-loader:
    image: ghcr.io/tech-beeline/beeatlas-fdm-pack-loader:latest
    container_name: fdm-pack-loader-app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./common.env
    environment:
      SPRING_RABBITMQ_TEMPLATE_EXCHANGE: ${PACK_LOADER_RABBITMQ_EXCHANGE:-pack.loader.exchange}
      SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: ${PACK_LOADER_RABBITMQ_ROUTING_KEY:-pack.loader.routing}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: pack_loader
      SPRING_FLYWAY_DEFAULT_SCHEMA: pack_loader
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
      OTEL_SDK_DISABLED: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    ports:
      - "${PACK_LOADER_APP_PORT:-8092}:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  events-history:
    image: ghcr.io/tech-beeline/beeatlas-events-history:latest
    container_name: events-history-app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./common.env
    environment:
      SPRING_RABBITMQ_TEMPLATE_EXCHANGE: ${EVENTS_HISTORY_RABBITMQ_EXCHANGE:-events.history.exchange}
      SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: ${EVENTS_HISTORY_RABBITMQ_ROUTING_KEY:-events.history}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: entity_events
      SPRING_FLYWAY_DEFAULT_SCHEMA: entity_events
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
      OTEL_SDK_DISABLED: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    ports:
      - "${EVENTS_HISTORY_SERVICE_PORT:-8093}:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  fdm-bpm:
    image: ghcr.io/tech-beeline/beeatlas-fdm-bpm:latest
    container_name: fdm-bpm
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./common.env
    environment:
      SPRING_DATASOURCE_CAMUNDA_URL: jdbc:postgresql://postgres:5432/fdm_db
      SPRING_DATASOURCE_CAMUNDA_USERNAME: postgres
      SPRING_DATASOURCE_CAMUNDA_PASSWORD: postgres
      SPRING_DATASOURCE_PROCESSES_URL: jdbc:postgresql://postgres:5432/fdm_db
      SPRING_DATASOURCE_PROCESSES_USERNAME: postgres
      SPRING_DATASOURCE_PROCESSES_PASSWORD: postgres
      SPRING_DATASOURCE_GIT_URL: jdbc:postgresql://postgres:5432/fdm_db
      SPRING_DATASOURCE_GIT_USERNAME: postgres
      SPRING_DATASOURCE_GIT_PASSWORD: postgres
      SPRING_RABBITMQ_TEMPLATE_EXCHANGE: ${FDM_BPM_RABBITMQ_EXCHANGE:-fdm.bpm.exchange}
      SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: ${FDM_BPM_RABBITMQ_ROUTING_KEY:-fdm.bpm}
      SPRING_JPA_PROCESSES_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROCESSES_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: processes
      SPRING_FLYWAY_DEFAULT_SCHEMA: processes
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
      CAMUNDA_BPM_DATABASE_SCHEMA_UPDATE: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    ports:
      - "${FDM_BPM_SERVICE_PORT:-8094}:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  fdm-bpm-local-init:
    image: postgres:15-alpine
    container_name: fdm-bpm-local-init
    depends_on:
      postgres:
        condition: service_healthy
      fdm-bpm:
        condition: service_healthy
    volumes:
      - ./scripts/fdm-bpm-local-urls.sql:/init.sql:ro
    environment:
      PGPASSWORD: postgres
    entrypoint: >
      /bin/sh -c "
      until psql -h postgres -U postgres -d fdm_db -tAc \"SELECT 1 FROM information_schema.tables WHERE table_schema='processes' AND table_name='application_type_enum'\" | grep -q 1; do sleep 2; done &&
      psql -h postgres -U postgres -d fdm_db -v ON_ERROR_STOP=1 -f /init.sql
      "
    restart: "no"
    networks:
      - fdm-network


  ff-manager:
    image: ghcr.io/tech-beeline/beeatlas-ff-manager:latest
    container_name: ff-manager
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./common.env
    environment:
      PORT: "8080"
      FF_DB_HOST: postgres
      FF_DB_PORT: "5432"
      FF_DB_USER: postgres
      FF_DB_PASSWORD: postgres
      FF_DB_NAME: fdm_db
      FF_API_BASE_URL: http://ff-manager:8080
      FF_FDM_PRODUCT_API_BASE_URL: http://products-service:8080
      FF_DOCUMENTS_API_BASE_URL: http://document-service:8080
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()\" || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "${FF_MANAGER_SERVICE_PORT:-8095}:8080"
    networks:
      - fdm-network
    restart: unless-stopped

  obs-dashboard:
    image: ghcr.io/tech-beeline/beeatlas-obs-dashboard:latest
    container_name: obs-dashboard
    depends_on:
      cx-service:
        condition: service_healthy
      products-service:
        condition: service_healthy
    env_file:
      - ./common.env
    environment:
      API_PORT: "3000"
      CX_SERVICE_URL: http://cx-service:8080
      PRODUCT_SERVICE_URL: http://products-service:8080
      GRAFANA_URL: ${INTEGRATION_GRAFANA_SERVER_URL:-http://grafana-service:8080}
      GRAFANA_ACCESS_TOKEN: ${INTEGRATION_GRAFANA_BEARER:-token}
      E2E_TEMPLATE_URL: http://grafana-service:8080/d/local-e2e-template/demo
    ports:
      - "${OBS_DASHBOARD_SERVICE_PORT:-8096}:3000"
    networks:
      - fdm-network
    restart: unless-stopped

networks:
  fdm-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  document-service-minio:
  authentik-media:
  authentik-templates:
  authentik-certs:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  authentik-postgres-data:
  n8n-data:
