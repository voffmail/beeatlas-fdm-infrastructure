name: Beeatlas-fdm API
tenant: default
routers:
  - server: Beeatlas-fdm API_LQz8
    prefix: /gateway/fdm
    cors:
      allowOrigins:
        - '*'
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - Content-Type
        - Authorization
        - Mcp-Session-Id
        - mcp-protocol-version
      exposeHeaders:
        - Mcp-Session-Id
        - mcp-protocol-version
      allowCredentials: true
servers:
  - name: Beeatlas-fdm API_LQz8
    description: API документация
    allowedTools:
      - getCapabilityMapById
      - getTechById
      - getKidsById
      - getById
      - getCriteriaList
      - getBusinessCapabilityOrderById
      - getBusinessCapabilityHistory
      - findTechCapabilitiesByProductId
      - getParentsById
      - getBusinessCapabilities
      - getBusinessCapabilityTreeById
      - getBusinessCapabilityOrderDraft
      - getTechCapabilities
      - getAllKidsIdById
      - getBusinessCapabilityHistoryVersion
      - getTechCapabilityHistory
      - searchCapability
      - getParentsById_1
      - getTechCapabilityHistoryVersion
      - getBusinessCapabilityTree
      - getAllTech
      - getTechByIdWithHistory
      - listProductTechRelations
      - getlistCategories
      - getlistTechByCategoryIds
      - getlistSectors
      - listRings
      - getPatternIdsByProduct
      - listProcesses
      - allPatterns
      - getAllTechnologyPatterns
      - getPatternsAutoCheck
      - getAllPatternsGroup
      - getTreePatternsGroup
      - getPatternsByChapter
      - getPatternsByIds
      - getPatternId
      - getAllFitnessFunctions
      - getAllMnemonics
      - getAllNfr
      - getAllProductsAndTechRelations
      - getAvailableProductsByCode
      - getChapterPatterns
      - getChaptersWithNfr
      - getContainersFromStructurizr
      - getContainersByCmdb
      - getE2eProcessByCmdb
      - getEmployeeByAlias
      - getFitnessFunctionsByProduct
      - getFitnessFunctionsAggregation
      - getFreeAlias
      - getDiscoveredInterface
      - getMapicApi
      - getNfrById
      - getNfrByPatternId
      - getParent
      - getProductInfra
      - getProductInfraContainsName
      - getProductNfr
      - getProductPatterns
      - getProductsByIds
      - getProductsFromMapic
      - getProductsFromStructurizr
      - getProductsInfo
      - getProductsInfoByCode
      - getProductsWithTech
      - getProductsByTechId
      - getServiceSecretByApiKey
      - getSourceMetrics
      - getImplementedTechCapabilitiesByProductId
      - getTcByContainerProduct
      - requestToMapic
      - searchInfra
      - search_operationsByPathAndType
      - search_operationsByTechCapabilityId
      - search_operationsTreeByTechCapabilityId
      - cx_getCJById
      - cx_getBIByCJStep
      - cx_getCJSteps
      - cx_getBI
      - cx_getCJStepById
      - cx_getBIById
      - cx_getCJv2
      - cx_getCJByIdV3
      - cx_getBIByIdV2
      - cx_getBIParticipants
      - cx_getBIFeelings
      - cx_getBIChannels
      - cx_getBIStatus
      - cx_getCJ
      - cx_getCJsByBiId
      - cx_getBIByFilter
      - cx_getEditabilityDtoBI
      - cx_getCjAlerts
      - getContextElements
      - getInfluenceElements
    config:
      url: http://eafdmmart-prod-fdm-gateway
tools:
  - name: getCapabilityMapById
    description: Возвращает карту возможностей по идентификатору (id).
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/maps/{{.Args.Id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: Id
        position: path
        required: true
        type: number
        description: Идентификатор карты.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getTechById
    description: Возвращает техническую возможность по её id.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/tech-capabilities/{{.Args.id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор технической возможности.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getKidsByIdV2
    description: Возвращает дочерние бизнес-возможности для указанной (версия API v2).
    method: GET
    endpoint: >-
      {{.Config.url}}/capability/api/v2/business-capability/{{.Args.id}}/children
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор бизнес-возможности.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getKidsById
    description: Возвращает список дочерних бизнес-возможностей для указанной.
    method: GET
    endpoint: >-
      {{.Config.url}}/capability/api/v1/business-capability/{{.Args.id}}/children
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор бизнес-возможности.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getById
    description: Возвращает бизнес-возможность по её id.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/business-capability/{{.Args.id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор бизнес-возможности.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getCriteriaList
    description: Возвращает список критериев с учетом опционального фильтра.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/criterias'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: filter
        position: query
        required: false
        type: string
        description: Опциональный фильтр для списка критериев.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getBusinessCapabilityOrderById
    description: Возвращает черновик/заказ публикации по id.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/business-capability/order/{{.Args.id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор заказа/черновика.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getBusinessCapabilityHistory
    description: Возвращает историю версий бизнес-возможности.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/business-capability/history/{{.Args.id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор бизнес-возможности.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: findTechCapabilitiesByProductId
    description: Возвращает технические возможности (ТС), которыми владеет продукт.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/tech-capabilities/product/{{.Args.id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: id продукта
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getParentsById
    description: Возвращает цепочку родителей для указанной технической возможности.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/tech-capabilities/{{.Args.id}}/parents'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор технической возможности.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getBusinessCapabilities
    description: Возвращает список бизнес-возможностей с учетом фильтров и пагинации.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/business-capability'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: limit
        position: query
        required: false
        type: integer
        description: Максимальное число записей в ответе.
        default: ''
        items:
          type: ''
      - name: findBy
        position: query
        required: false
        type: string
        description: 'Режим фильтрации (например: ALL).'
        default: ALL
        items:
          type: ''
      - name: offset
        position: query
        required: false
        type: integer
        description: Смещение для пагинации.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getBusinessCapabilityTreeById
    description: Возвращает дерево, построенное от указанной бизнес-возможности.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/business-capability/tree/{{.Args.id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: integer
        description: Идентификатор бизнес-возможности (корень дерева).
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getBusinessCapabilityOrderDraft
    description: Возвращает текущие черновики публикации каталога.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/business-capability/order/draft'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getTechCapabilities
    description: Возвращает список технических возможностей с пагинацией.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/tech-capabilities'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: limit
        position: query
        required: false
        type: integer
        description: Максимальное число записей в ответе.
        default: ''
        items:
          type: ''
      - name: offset
        position: query
        required: false
        type: integer
        description: Смещение для пагинации.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getAllKidsIdById
    description: Возвращает id всех дочерних бизнес-возможностей (включая вложенные).
    method: GET
    endpoint: >-
      {{.Config.url}}/capability/api/v1/business-capability/{{.Args.id}}/children/all
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор бизнес-возможности.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getBusinessCapabilityHistoryVersion
    description: Возвращает сравнение указанной версии с другой (при наличии параметра).
    method: GET
    endpoint: >-
      {{.Config.url}}/capability/api/v1/business-capability/history/compare/{{.Args.id}}/{{.Args.version}}
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор бизнес-возможности.
        default: ''
        items:
          type: ''
      - name: version
        position: path
        required: true
        type: number
        description: Номер версии для сравнения.
        default: ''
        items:
          type: ''
      - name: other_version
        position: query
        required: false
        type: number
        description: 'Опционально: вторая версия для сравнения.'
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getTechCapabilityHistory
    description: Возвращает историю версий технической возможности.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/tech-capabilities/history/{{.Args.id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор технической возможности.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: searchCapability
    description: Ищет Возможности, по сущностям, по строке запроса и типу поиска.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/find'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: findBy
        position: query
        required: false
        type: string
        description: Тип сущности для поиска (по умолчанию ALL).
        default: ALL
        items:
          type: ''
      - name: search
        position: query
        required: true
        type: string
        description: Строка поиска.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getParentsById_1
    description: Возвращает цепочку родителей для указанной бизнес-возможности.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/business-capability/{{.Args.id}}/parents'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор бизнес-возможности.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getTechCapabilityHistoryVersion
    description: Возвращает сравнение указанной версии с другой (при наличии параметра).
    method: GET
    endpoint: >-
      {{.Config.url}}/capability/api/v1/tech-capabilities/history/compare/{{.Args.id}}/{{.Args.version}}
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: Идентификатор технической возможности.
        default: ''
        items:
          type: ''
      - name: version
        position: path
        required: true
        type: number
        description: Номер версии для сравнения.
        default: ''
        items:
          type: ''
      - name: other_version
        position: query
        required: false
        type: number
        description: 'Опционально: вторая версия для сравнения.'
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getBusinessCapabilityTree
    description: Возвращает дерево бизнес-возможностей.
    method: GET
    endpoint: '{{.Config.url}}/capability/api/v1/business-capability/tree'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getAllTech
    description: >-
      Получить список всех технологий. Возвращает список технологий. При наличии
      параметра actualTech может фильтровать по актуальности.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/tech'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: actualTech
        position: query
        required: false
        type: boolean
        description: >-
          Фильтр по актуальности технологии. Допустимые значения: true/false.
          Если параметр не передан — возвращаются все технологии.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getTechByIdWithHistory
    description: >-
      Получить технологию по ID (с историей статусов). Возвращает технологию и
      историю изменения её статусов по идентификатору.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/tech/{{.Args.id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
        position: path
        required: true
        type: number
        description: >-
          Идентификатор технологии (целое число). Пример: 123. Если технологии с
          таким id нет — сервис вернёт 404.
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: listProductTechRelations
    description: >-
      Получить связи продукт↔технология. Возвращает список продуктов и их связей
      с технологиями.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/tech/product-tech'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getlistCategories
    description: Получить список категорий технологий техрадара
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/category'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getlistTechByCategoryIds
    description: >-
      Получить технологии по категориям. Возвращает список технологий,
      относящихся к переданным категориям.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/category/tech'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id_category
        position: query
        required: true
        type: array
        description: >-
          Список идентификаторов категорий (массив целых чисел). Пример:
          id_category=1&id_category=2&id_category=3.
        default: ''
        items:
          type: integer
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getlistSectors
    description: Получить список секторов. Возвращает все доступные сектора.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/sectors'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: listRings
    description: Получить список колец. Возвращает все доступные кольца.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/rings'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: listProcesses
    description: Получить список процессов. Возвращает все процессы.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/processes'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: allPatterns
    description: Просмотр всех паттернов проектирования.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/patterns'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getAllTechnologyPatterns
    description: Просмотр всех паттернов связанных с технологией.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/patterns/tech/{{.Args.tech_id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: tech_id
        position: path
        required: true
        type: integer
        description: 'Идентификатор технологии (целое число). Пример: 123.'
        default: ''
        items:
          type: ''
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getPatternsAutoCheck
    description: >-
      Просмотр паттернов принятых в компании, для которых есть правило
      автоматической проверки.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/patterns/auto-check'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getAllPatternsGroup
    description: Просмотр групп паттернов проектирования.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/pattern/group'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getTreePatternsGroup
    description: Просмотр дерева групп паттернов проектирования.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/pattern/group/tree'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    requestBody: ''
    responseBody: '{{.Response.Body}}'
  - name: getPatternsByChapter
    description: Получить паттерны по главе (chapter) из product.
    method: GET
    endpoint: '{{.Config.url}}/techradar/api/v1/pattern/chapter/{{.Args.id}}'
    headers:
      Authorization: '{{.Request.Headers.Authorization}}'
      Content-Type: application/json
    args:
      - name: id
