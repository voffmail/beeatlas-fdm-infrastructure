
version: 1
metadata:
  name: FDM minimal setup
  labels:
    blueprints.goauthentik.io/instantiate: "true"
    blueprints.goauthentik.io/description: "OAuth provider aligned with DEMO_AUTH defaultUser (fdm-auth DB)"
entries:
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - Invalidation flow
      required: true

  - model: authentik_core.user
    state: present
    identifiers:
      username: akadmin
    attrs:
      email: default@beeline.ru
      name: Ivan Ivanov
      Employee-Number: "1"
      family_name: Ivan
      given_name: Ivanov
      winaccountname: defaultUser

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: FDM OAuth scope (default)
    state: absent

  - model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: FDM OAuth scope (openid)
    attrs:
      scope_name: openid
      expression: |
        return {
            "sub": user.attributes.get("winaccountname", "defaultUser"),
        }

  - model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: FDM OAuth scope (profile)
    attrs:
      scope_name: profile
      expression: |
        return {
          "family_name": user.attributes.get("family_name", ""),
          "given_name": user.attributes.get("given_name", ""),
          "winaccountname": user.attributes.get("winaccountname", ""),
          "Employee-Number": user.attributes.get("Employee-Number", "")
        }

  - model: authentik_stages_redirect.redirectstage
    state: present
    identifiers:
      name: FDM logout redirect
    attrs:
      name: FDM logout redirect
      mode: static
      target_static: http://localhost:5000

  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
      stage: !Find [authentik_stages_redirect.redirectstage, [name, FDM logout redirect]]
      order: 1
    attrs:
      order: 1
      re_evaluate_policies: true

  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: Provider for fdm-app
    attrs:
      client_id: SxbmzvcDJHqs415xgqo8hPQh6CtHvop5jFGF1Wb2
      client_type: public
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      redirect_uris:
        - matching_mode: regex
          url: http://localhost:3000/.*
        - matching_mode: strict
          url: http://localhost:3000
        - matching_mode: strict
          url: http://localhost:3000/
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [name, FDM OAuth scope (openid)]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, FDM OAuth scope (profile)]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]

  - model: authentik_core.application
    state: present
    identifiers:
      slug: beeatlas
    attrs:
      name: beeatlas
      slug: beeatlas
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Provider for fdm-app]]
